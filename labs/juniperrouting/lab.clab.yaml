name: juniperrouting
topology:
  nodes:
    router1:
      kind: juniper_vjunosrouter
      image: vrnetlab/juniper_vjunos-router:25.4R1.12
      startup-config: router1.txt
    router2:
      kind: juniper_vjunosrouter
      image: vrnetlab/juniper_vjunos-router:25.4R1.12
      startup-config: router2.txt
    router3:
      kind: juniper_vjunosrouter
      image: vrnetlab/juniper_vjunos-router:25.4R1.12
      startup-config: router3.txt

    pc1:
      kind: linux
      image: alpine:latest
      exec:
        - "ip a add 10.1.1.5/24 dev eth1"
        - "ip -6 a add 2006:db8:a::5/64 dev eth1"
        - "ip r add 10.0.0.0/8 via 10.1.1.1"
        - "ip -6 r add 2006:db8:a::/64 via 2006:db8:a::1 dev eth1"

    pc2:
      kind: linux
      image: alpine:latest
      exec:
        - "ip a add 10.1.2.5/24 dev eth1"
        - "ip -6 a add 2006:db8:b::1/64 dev eth1"
        - "ip r add 10.0.0.0/8 via 10.1.2.1"
        - "ip -6 r add 2006:db8:b::/64 via 2006:db8:b::1 dev eth1"

    pc3:
      kind: linux
      image: alpine:latest
      exec:
        - "ip a add 10.1.3.5/24 dev eth1"
        - "ip -6 a add 2006:db8:c::1/64 dev eth1"
        - "ip r add 10.0.0.0/8 via 10.1.3.1"
        - "ip -6 r add 2006:db8:c::/64 via 2006:db8:c::1 dev eth1"

    other:
      kind: linux
      image: alpine:latest
      exec:
        - "ip a add 192.168.4.2/30 dev eth1"
        - "ip -6 a add 2006:db8:88::5/64 dev eth1"
        - "ip r add 10.0.0.0/8 via 192.168.4.1"
        - "ip -6 r add 2006:db8:88::/64 via 2006:db8:88::1 dev eth1"

  links:
    - endpoints: ["router1:eth1", "router2:eth1"]
    - endpoints: ["router2:eth2", "router3:eth1"]
    - endpoints: ["router1:eth2", "router3:eth2"]

    - endpoints: ["pc1:eth1", "router1:eth6"]
    - endpoints: ["pc2:eth1", "router2:eth6"]
    - endpoints: ["pc3:eth1", "router3:eth6"]

    - endpoints: ["other:eth1", "router2:eth7"]

